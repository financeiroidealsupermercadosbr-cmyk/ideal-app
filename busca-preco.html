<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Busca Preço · Ideal Supermercados</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none}
  html,body{height:100%;width:100%;overflow:hidden;background:#fff;
    font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:#16267A;cursor:none}
  #app{height:100vh;width:100vw;display:flex;flex-direction:column}

  header{flex:0 0 auto;background:#FFC400;display:flex;align-items:center;
    padding:1.4vh 2.2vw;gap:1.5vw}
  header .ttl{display:flex;align-items:center;gap:1.2vw;color:#16267A;font-weight:700}
  header .ttl .ic{height:4.6vh;width:auto;display:block}
  header .ttl .tx{font-size:3.4vh;letter-spacing:.3px}
  header .sp{flex:1}
  header img.logo{height:9.5vh;aspect-ratio:1;width:auto;border-radius:50%;object-fit:cover;display:block}

  main{flex:1;display:flex;align-items:center;justify-content:center;padding:2vh 4vw;position:relative}

  /* repouso */
  #idle{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2vh;text-align:center}
  #idle img.big{height:24vh;aspect-ratio:1;width:auto;border-radius:50%;object-fit:cover}
  #idle .bp{display:flex;flex-direction:column;align-items:center;gap:1.1vh}
  #idle .bpbig{color:#16267A;font-weight:800;font-size:clamp(44px,12vw,220px);line-height:1;letter-spacing:1px}
  #idle .ulin{height:.9vh;min-height:6px;width:34vw;max-width:560px;background:#FFC400;border-radius:6px}
  #idle .prompt{color:#5F5E5A;font-size:clamp(18px,3.6vh,46px);font-weight:600}

  /* resultado */
  #result{display:none;flex-direction:column;align-items:center;justify-content:center;width:100%;gap:1vh;text-align:center}
  #result .nome{color:#222;font-weight:700;font-size:clamp(22px,5.2vh,80px);line-height:1.1;max-width:94vw}
  #result .barras{color:#888780;font-family:monospace;font-size:clamp(13px,2.4vh,34px);margin-bottom:.6vh}
  #result .pbox{background:#FFF3D6;border-radius:20px;padding:2.2vh 6vw;display:flex;flex-direction:column;align-items:center;min-width:50vw}
  #result .pbox .lab{color:#9A6B00;font-size:clamp(14px,2.6vh,38px);font-weight:600;letter-spacing:1px}
  #result .pbox .val{color:#16267A;font-weight:800;font-size:clamp(54px,15vw,260px);line-height:1.02}
  #result .atac{color:#5F5E5A;font-size:clamp(16px,3.4vh,46px);font-weight:600;margin-top:1.2vh}
  #result .atac b{color:#1B3A9E}
  #result .hint{color:#B4B2A9;font-size:clamp(13px,2.2vh,30px);margin-top:1.4vh}

  /* nao encontrado */
  #nf{display:none;flex-direction:column;align-items:center;gap:2vh;text-align:center}
  #nf .ic{height:13vh;width:auto}
  #nf .t1{color:#A32D2D;font-weight:700;font-size:clamp(22px,5vh,70px)}
  #nf .t2{color:#888780;font-family:monospace;font-size:clamp(14px,2.6vh,34px)}

  /* carregando */
  #load{display:none;flex-direction:column;align-items:center;gap:2vh;text-align:center;color:#888780}
  #load .t1{font-size:clamp(18px,3.6vh,44px);font-weight:600}

  footer{flex:0 0 auto;background:#16267A;color:#fff;opacity:.92;
    font-size:1.7vh;padding:.8vh 2.2vw;display:grid;grid-template-columns:1fr auto 1fr;align-items:center}
  footer .r{justify-self:end;opacity:.7}
  footer .l{justify-self:center;text-align:center}
  footer #ft-wifi{justify-self:start;font-weight:600}
  #flash{position:fixed;inset:0;pointer-events:none;opacity:0;z-index:9}
  #idle .promo{margin-top:1.4vh;min-width:60vw;max-width:92vw;border-radius:14px;padding:1.3vh 4vw;color:#fff;text-align:center;transition:opacity .45s;background:#9A6B00}
  #idle .promo .ptit{font-weight:800;font-size:clamp(20px,4.6vh,64px);line-height:1.05}
  #idle .promo .psub{font-size:clamp(13px,2.4vh,32px);opacity:.93;margin-top:.4vh}
</style>
</head>

      elNf=document.getElementById('nf'), elLoad=document.getElementById('load'),
      elNome=document.getElementById('r-nome'), elBarras=document.getElementById('r-barras'),
      elPreco=document.getElementById('r-preco'), elAtac=document.getElementById('r-atac'),
      elPlab=document.getElementById('r-plab'),
      elPromo=document.getElementById('promo'), elPromoT=document.getElementById('promo-tit'), elPromoS=document.getElementById('promo-sub'),
      elWifi=document.getElementById('ft-wifi'),
      elNfCode=document.getElementById('nf-code'), elFtR=document.getElementById('ft-r');

  function brl(n){
    n = Number(n)||0;
    try { return n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
    catch(e){ return 'R$ ' + n.toFixed(2).replace('.',','); }
  }
  function num(v){
    if(typeof v === 'number') return v;
    var s = String(v||'').trim(); if(!s) return 0;
    if(s.indexOf(',')>=0 && s.indexOf('.')>=0) s = s.replace(/\./g,'').replace(',','.');
    else if(s.indexOf(',')>=0) s = s.replace(',','.');
    return parseFloat(s)||0;
  }
  function hhmm(){ var d=new Date(); function p(x){return (x<10?'0':'')+x;} return p(d.getHours())+':'+p(d.getMinutes()); }

  // bip + flash de retorno ao ler
  var audioCtx = null;
  function beep(freq, dur){
    try{
      if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      if(audioCtx.state === 'suspended') audioCtx.resume();
      var o = audioCtx.createOscillator(), g = audioCtx.createGain(), t = audioCtx.currentTime;
      o.type='square'; o.frequency.value=freq; o.connect(g); g.connect(audioCtx.destination);
      g.gain.setValueAtTime(0.18, t); g.gain.exponentialRampToValueAtTime(0.001, t + dur/1000);
      o.start(t); o.stop(t + dur/1000);
    }catch(e){}
  }
  function flash(cor){
    var f = document.getElementById('flash'); if(!f) return;
    f.style.transition='none'; f.style.background=cor; f.style.opacity='0.45';
    requestAnimationFrame(function(){ requestAnimationFrame(function(){ f.style.transition='opacity .4s'; f.style.opacity='0'; }); });
  }
  function okScan(){ beep(950,110); flash('#FFC400'); }
  function erroScan(){ beep(300,200); flash('#E24B4A'); }

  // status de conexão (Wi-Fi)
  var online = (typeof navigator!=='undefined' && 'onLine' in navigator) ? navigator.onLine : true;
  function setOnline(v){
    online = v; if(!elWifi) return;
    elWifi.textContent = '● Wi-Fi ' + (v ? 'ok' : 'sem sinal');
    elWifi.style.color = v ? '#9CE6B0' : '#F2A0A0';
  }

  // ofertas que giram no repouso
  var promoIdx = 0, promosHoje = [];
  function montarPromos(){
    var d = new Date().getDay();
    promosHoje = PROMOS.filter(function(p){ return !p.dias || !p.dias.length || p.dias.indexOf(d) >= 0; });
  }
  function girarPromo(){
    if(!elPromo) return;
    if(!promosHoje.length){ elPromo.style.display='none'; return; }
    elPromo.style.display='block';
    var p = promosHoje[promoIdx % promosHoje.length]; promoIdx++;
    elPromo.style.opacity = '0';
    setTimeout(function(){
      elPromo.style.background = p.cor || '#9A6B00';
      elPromoT.textContent = p.titulo || '';
      elPromoS.textContent = p.sub || '';
      elPromo.style.opacity = '1';
    }, 280);
  }

  function mostrar(el){
    elIdle.style.display = (el===elIdle)?'flex':'none';
    elRes.style.display  = (el===elRes)?'flex':'none';
    elNf.style.display   = (el===elNf)?'flex':'none';
    elLoad.style.display = (el===elLoad)?'flex':'none';
  }
  function repouso(){ if(idleTimer){clearTimeout(idleTimer);idleTimer=null;} mostrar(elIdle); }
  function agendarRepouso(){ if(idleTimer) clearTimeout(idleTimer); idleTimer=setTimeout(repouso, IDLE_MS); }

  function mostrarProduto(p, codeMostrar){
    okScan();
    elNome.textContent = p.nome || '(sem descrição)';
    elBarras.textContent = codeMostrar ? ('código ' + codeMostrar) : '';
    elPlab.textContent = (p.un === 'KG') ? 'Preço por kg' : 'Preço';
    if(p.varejo > 0){
      elPreco.textContent = brl(p.varejo);
      if(p.atacado > 0 && p.atacado < p.varejo){
        elAtac.innerHTML = 'A partir de ' + ATACADO_MIN + ' un: <b>' + brl(p.atacado) + '</b> cada';
        elAtac.style.display = 'block';
      } else { elAtac.style.display = 'none'; }
    } else {
      elPreco.textContent = '—';
      elAtac.innerHTML = 'Preço não cadastrado · consulte o caixa';
      elAtac.style.display = 'block';
    }
    mostrar(elRes); agendarRepouso();
  }
  function mostrarNaoEncontrado(code){
    erroScan();
    elNf.querySelector('.t1').textContent = 'Produto não encontrado';
    elNfCode.textContent = 'código ' + code;
    mostrar(elNf); agendarRepouso();
  }
  function mostrarCarregando(){
    elNf.querySelector('.t1').textContent = 'Carregando preços…';
    elNfCode.textContent = 'tente de novo em instantes';
    mostrar(elNf); agendarRepouso();
  }

  function buscar(codeRaw){
    var code = String(codeRaw||'').replace(/\D/g,'');
    if(!code) return;
    if(total === 0){ mostrarCarregando(); return; }
    var p = idx[code] || idx[code.replace(/^0+/,'')] || idx['0'+code];
    if(p) mostrarProduto(p, code); else mostrarNaoEncontrado(code);
  }

  function aplicarIndice(novo, n){ idx = novo; total = n; atualizarRodape(); }
  function construirIndice(values){
    var novo = Object.create(null), n = 0, compact = [];
    for(var i=0;i<values.length;i++){
      var r = values[i]; if(!r) continue;
      var cod = String(r[0]||'').trim();
      if(!/^\d+$/.test(cod)) continue;                 // pula cabeçalho/lixo
      var barras = String(r[2]||'').trim();
      var prod = { nome:String(r[1]||'').trim(), un:String(r[3]||'').trim().toUpperCase(), varejo:num(r[7]), atacado:num(r[8]) };
      if(barras) novo[barras] = prod;
      novo[cod] = novo[cod] || prod;                   // fallback pelo código interno
      compact.push([cod, prod.nome, prod.un, barras, prod.varejo, prod.atacado]);
      n++;
    }
    aplicarIndice(novo, n);
    salvarCompact(compact);
  }
  function construirCompact(arr){
    var novo = Object.create(null), n = 0;
    for(var i=0;i<arr.length;i++){
      var c = arr[i]; if(!c) continue;
      var prod = { nome:c[1]||'', un:c[2]||'', varejo:Number(c[4])||0, atacado:Number(c[5])||0 };
      if(c[3]) novo[c[3]] = prod;
      if(c[0]) novo[c[0]] = novo[c[0]] || prod;
      n++;
    }
    aplicarIndice(novo, n);
  }

  var bancoStamp = '';
  function bancoCurto(s){ var m=String(s).match(/(\d{2})\/(\d{2})\/\d{2,4}\s+(\d{1,2}:\d{2})/); return m ? (m[1]+'/'+m[2]+' '+m[3]) : s; }
  function dataHora(){ var d=new Date(); function p(x){return (x<10?'0':'')+x;} return p(d.getDate())+'/'+p(d.getMonth()+1)+'/'+d.getFullYear()+' '+p(d.getHours())+':'+p(d.getMinutes()); }
  function atualizarRodape(){
    elFtR.textContent = 'Atualizado em ' + (bancoStamp ? bancoStamp : dataHora());
  }
  function atualizarBanco(){
    var url = 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID
            + '/values/' + encodeURIComponent('Metadados!A:B') + '?key=' + API_KEY + '&_=' + Date.now();
    fetch(url, {cache:'no-store'}).then(function(r){ return r.ok ? r.json() : null; }).then(function(j){
      if(!j || !j.values) return;
      for(var i=0;i<j.values.length;i++){ if(String(j.values[i][0]).trim() === 'ultima_atualizacao_banco'){ bancoStamp = String(j.values[i][1]||'').trim(); break; } }
      atualizarRodape();
    }).catch(function(){});
  }

  function salvarCompact(arr){
    try{ localStorage.setItem(CACHE_KEY, JSON.stringify({t:Date.now(), c:arr})); }catch(e){}
  }
  function carregarCache(){
    try{
      var raw = localStorage.getItem(CACHE_KEY); if(!raw) return false;
      var o = JSON.parse(raw); if(!o || !o.c || !o.c.length) return false;
      construirCompact(o.c); return true;
    }catch(e){ return false; }
  }

  // Reserva: le direto do Google Sheets (jeito antigo).
  function atualizarSheets(){
    var url = 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID
            + '/values/' + encodeURIComponent(RANGE) + '?key=' + API_KEY + '&_=' + Date.now();
    fetch(url, {cache:'no-store'})
      .then(function(res){ if(!res.ok) throw new Error('HTTP '+res.status); return res.json(); })
      .then(function(j){
        var values = (j && j.values) || [];
        if(values.length){ construirIndice(values); }
        setOnline(true);
      })
      .catch(function(e){
        setOnline(false);
        if(total===0) elFtR.textContent = 'sem conexão — tentando…';
      });
  }

  // Principal: le do Supabase (rapido, sem cota). Se falhar, cai pro Sheets.
  function atualizar(){
    if(!SUPA_ANON || SUPA_ANON.indexOf('COLE_AQUI') === 0){ atualizarSheets(); return; }
    fetch(SUPA_URL + '/rest/v1/rpc/bp_produtos', {
      method:'POST',
      headers:{ 'apikey':SUPA_ANON, 'Authorization':'Bearer '+SUPA_ANON, 'Content-Type':'application/json' },
      cache:'no-store',
      body: JSON.stringify({ p_cliente: CLIENTE_ID })
    })
      .then(function(res){ if(!res.ok) throw new Error('HTTP '+res.status); return res.json(); })
      .then(function(arr){
        if(arr && arr.length){ construirCompact(arr); salvarCompact(arr); setOnline(true); }
        else { atualizarSheets(); }   // veio vazio -> tenta o Sheets
      })
      .catch(function(e){ atualizarSheets(); });   // erro -> reserva
  }

  // ---- leitor de código (funciona como teclado) ----
  var buf = '', last = 0;
  document.addEventListener('keydown', function(ev){
    if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
    else if(audioCtx.state === 'suspended'){ audioCtx.resume(); }
    var now = Date.now();
    if(now - last > 600) buf = '';   // recomeça se demorou (digitação humana solta)
    last = now;
    if(ev.key === 'Enter'){ if(buf.length){ buscar(buf); } buf=''; ev.preventDefault(); return; }
    if(ev.key && ev.key.length === 1){ buf += ev.key; }
    // qualquer toque/tecla também adia o retorno ao repouso
    if(elRes.style.display!=='none' || elNf.style.display!=='none') agendarRepouso();
  });
  // toque na tela volta ao repouso
  document.addEventListener('click', function(){ if(elRes.style.display!=='none'||elNf.style.display!=='none') repouso(); });

  // ---- início ----
  setOnline(online);
  window.addEventListener('online',  function(){ setOnline(true); atualizar(); });
  window.addEventListener('offline', function(){ setOnline(false); });
  montarPromos(); girarPromo(); setInterval(girarPromo, 6500);
  carregarCache();
  repouso();
  atualizar(); atualizarBanco();
  setInterval(function(){ atualizar(); atualizarBanco(); }, REFRESH_MS);
  darOi();                                  // dá o 1º "oi" ao ligar
  setInterval(darOi, HEARTBEAT_MS);         // e segue dando de tempos em tempos
})();
</script>
