<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Folha — teste</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#EEF0F6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;color:#2C2C2A}
  .phone{max-width:430px;margin:0 auto;min-height:100vh;background:#fff;position:relative}
  /* barra só do teste (não vai pro app) */
  .testbar{background:#11183a;color:#fff;padding:8px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px}
  .testbar b{font-size:11px;opacity:.7;letter-spacing:.4px;text-transform:uppercase}
  .testbar select,.testbar button{font-size:12px;padding:5px 8px;border-radius:7px;border:1px solid #3a4470;background:#1c2550;color:#fff;cursor:pointer}
  .testbar .on{background:#FFC400;color:#16267A;border-color:#FFC400;font-weight:600}
  .row-card{display:flex;align-items:flex-start;background:#fff;border:1px solid #ECECEC;border-radius:12px;padding:11px 13px}
  .row-label{font-size:14px;font-weight:600;color:#2C2C2A}
  .row-sub{font-size:12px;color:#888780;margin-top:2px}
  .btn-primary{width:100%;background:#16267A;color:#fff;border:none;border-radius:11px;height:46px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
  .loadrow{display:flex;align-items:center;gap:8px;color:#888780;font-size:13px;padding:14px 2px}
  .spin{width:15px;height:15px;border:2px solid #ccc;border-top-color:#16267A;border-radius:50%;display:inline-block;animation:sp 0.7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#2C2C2A;color:#fff;padding:11px 18px;border-radius:24px;font-size:13px;z-index:999999;opacity:0;transition:opacity .2s;max-width:90%;text-align:center}
  .toast.show{opacity:.96}
  /* animações do calendário (igual Contas Fixas) */
  @keyframes coPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.7);opacity:.45}}
  #s-folha .fo-dot{animation:coPulse 1.8s ease-in-out infinite}
  #s-folha .fo-daycell{transition:transform .12s ease}
  #s-folha .fo-daycell:active{transform:scale(.93)}
  @keyframes coFade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  #s-folha #fo-cal-dia>div{animation:coFade .22s ease}
  @keyframes foCardIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .fo-fcard{animation:foCardIn .25s ease both}
  .chip{display:inline-block;font-size:11px;color:#16267A;background:#E6E9F5;padding:3px 9px;border-radius:7px;white-space:nowrap}
  .chip-amber{color:#7a5a00;background:#FFF1C2}
</style>
</head>
<body>
<div class="phone">

  <!-- ░░░ barra de teste — apaga quando portar pro app ░░░ -->
  <div class="testbar">
    <b>teste</b>
    <span>Loja:</span>
    <select id="t-loja" onchange="tSetLoja(this.value)">
      <option value="l1">Loja 1 (com dados)</option>
      <option value="l2">Loja 2 (vazia)</option>
      <option value="bolos">Ideal Bolos (vazia)</option>
    </select>
    <button id="t-gestor" class="on" onclick="tToggleGestor()">Gestor: ON</button>
    <button onclick="tReset()">resetar dados</button>
  </div>

  <!-- ░░░ TELA FOLHA (esta parte vai pro index.html) ░░░ -->
  <div class="screen" id="s-folha">
    <div style="display:flex;align-items:center;gap:10px;padding:16px 16px 12px;border-bottom:1px solid rgba(0,0,0,0.08)">
      <i class="ti ti-arrow-left" style="font-size:21px;cursor:pointer;color:#16267A" onclick="toast('No app, isto volta pro Menu')"></i>
      <div style="flex:1">
        <div style="font-size:16px;font-weight:600;color:#16267A">Folha de pagamento</div>
        <div style="font-size:11.5px;color:#888780" id="fo-sub">Carregando…</div>
      </div>
      <i class="ti ti-refresh" style="font-size:19px;cursor:pointer;color:#16267A" onclick="foCarregar()" title="Atualizar"></i>
      <i class="ti ti-dots-vertical" id="fo-cfg-btn" style="font-size:20px;cursor:pointer;color:#16267A;margin-left:2px;display:none" onclick="foConfigMenu()" title="Configurar"></i>
    </div>

    <div style="padding:12px 14px 0">
      <div style="background:linear-gradient(135deg,#16267A,#1B3A9E);color:#fff;border-radius:13px;padding:13px 15px">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div><div style="font-size:11px;opacity:.85;text-transform:uppercase;letter-spacing:.3px">Total do mês</div><div id="fo-total" style="font-size:21px;font-weight:700;margin-top:2px">R$ 0,00</div></div>
          <div id="fo-qtd" style="text-align:right;font-size:11.5px;opacity:.9">0 pessoas</div>
        </div>
      </div>
    </div>

    <div style="display:flex;align-items:center;justify-content:center;gap:18px;padding:10px 14px 0">
      <i class="ti ti-chevron-left" style="font-size:22px;color:#16267A;cursor:pointer" onclick="foMesNav(-1)"></i>
      <div id="fo-mes-titulo" style="font-size:14px;font-weight:600;color:#16267A;min-width:140px;text-align:center">—</div>
      <i class="ti ti-chevron-right" style="font-size:22px;color:#16267A;cursor:pointer" onclick="foMesNav(1)"></i>
    </div>

    <div style="display:flex;gap:6px;padding:10px 14px 0">
      <button id="fo-tabbtn-lista" onclick="foTab('lista')" style="flex:1;padding:9px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;background:#16267A;color:#fff;border:none">Lista</button>
      <button id="fo-tabbtn-cal" onclick="foTab('cal')" style="flex:1;padding:9px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:#16267A;border:1px solid #16267A">Calendário</button>
    </div>

    <div id="fo-tab-lista" style="padding:12px 14px 110px">
      <div id="fo-lista"><div class="loadrow"><span class="spin"></span> Carregando…</div></div>
      <button class="btn-primary" id="fo-nova-btn" style="margin-top:14px;display:none" onclick="foNovoFunc()"><i class="ti ti-user-plus"></i> Novo funcionário</button>
    </div>

    <div id="fo-tab-cal" style="display:none;padding:12px 14px 110px">
      <div id="fo-cal"></div>
      <div id="fo-cal-dia" style="margin-top:14px"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════════
// AMBIENTE DE TESTE — substitutos dos helpers que já existem no app.
// (No app real, estes já existem: ehGestor, userAtual, _precoBRL, etc.)
// ══════════════════════════════════════════════════════════════════
var lojaAtual = 'l1';
var userAtual = { nome:'Gilberto', nivel:'gestor' };
var _gestorTeste = true;
function ehGestor(){ return _gestorTeste; }
var _fzMesNomes = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
function _precoEsc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function _precoBRL(n){ n=Number(n)||0; return 'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._tm); t._tm=setTimeout(function(){ t.classList.remove('show'); },2200); }
function appConfirm(msg,onYes,opt){
  opt=opt||{};
  var ov=document.createElement('div'); ov.style.cssText='position:fixed;inset:0;background:rgba(20,30,60,.45);z-index:99999;display:flex;align-items:center;justify-content:center;padding:22px';
  var card=document.createElement('div'); card.style.cssText='background:#fff;border-radius:14px;max-width:330px;width:100%;padding:18px';
  card.innerHTML='<div style="font-size:14.5px;color:#2C2C2A;margin-bottom:16px;line-height:1.45;white-space:pre-line">'+_precoEsc(msg)+'</div>'
    +'<div style="display:flex;gap:8px"><button id="_c_no" style="flex:1;background:#fff;color:#5F5E5A;border:1px solid #D3D1C7;border-radius:9px;height:42px;font-size:14px">Cancelar</button>'
    +'<button id="_c_yes" style="flex:1;background:'+(opt.danger?'#A32D2D':'#16267A')+';color:#fff;border:none;border-radius:9px;height:42px;font-size:14px;font-weight:500">'+(opt.okText||'OK')+'</button></div>';
  ov.appendChild(card); document.body.appendChild(ov);
  function close(){ if(ov.parentNode) ov.parentNode.removeChild(ov); }
  ov.addEventListener('click',function(e){ if(e.target===ov) close(); });
  card.querySelector('#_c_no').onclick=close;
  card.querySelector('#_c_yes').onclick=function(){ close(); onYes&&onYes(); };
}

// ── Banco de dados FALSO (na memória). No app, isto some — quem responde é o servidor. ──
var _DB = { func:[], pag:[] };
var FOLHA_SEED_L1 = [
  ['FRENTE DE CAIXA','Erika Beatriz Dias',1700,200],['FRENTE DE CAIXA','Ramila Cristina Alcantara de Souza',1700,200],
  ['FRENTE DE CAIXA','Maria Fernanda dos Santos Martins',1700,200],['FRENTE DE CAIXA','Fernanda de Oliveira Arantes',1700,200],
  ['FRENTE DE CAIXA','Cristiane Aparecida Jesus Pereira',1700,200],['FRENTE DE CAIXA','Bruna Rafaela Gomes da Costa',1700,284],
  ['FRENTE DE CAIXA','Maria Paula Lopes Mendes',1700,200],['FRENTE DE CAIXA','Joyce Kathleen Pereira dos Santos',1700,264],
  ['FRENTE DE CAIXA','Rosilene dos Santos Alexandrino',1700,264],['FRENTE DE CAIXA','Bianca Barros de Sousa Araújo',1700,264],
  ['FRENTE DE CAIXA','Ana Letícia',1700,200],['FRENTE DE CAIXA','Larissa de Jesus Pinto',1700,200],
  ['FRENTE DE CAIXA','Julia Cristina Luiz',1700,200],['FRENTE DE CAIXA','Bianca Oliveira',1700,200],
  ['FRENTE DE CAIXA','Carla Emanuelle de Carvalho Costa',1700,200],
  ['FISCAIS DE CAIXA','Ana Lice Oliveira de Sousa',null,null],['FISCAIS DE CAIXA','Lane de Jesus Santos',null,null],
  ['REPOSITORES','Wesley Vieira de Souza',1700,264],['REPOSITORES','Teresa Raquel Soares da Silva',1700,140],
  ['REPOSITORES','Kaike Souza Silva Silva',1700,140],['REPOSITORES','Juan Ribeiro Marques de Araujo',1700,140],
  ['REPOSITORES','Atila Alexsander Almeida',1700,140],['REPOSITORES','Virginia Flavia Godinho Meira',1700,140],
  ['REPOSITORES','Ricardo',1700,140],['REPOSITORES','Davi Pereira do Nascimento',1700,140],['REPOSITORES','Antonio Evangelista',1700,140],
  ['AÇOUGUE','Wanderson Marciel da Costa',null,null],['AÇOUGUE','Antonio Lucivan Ferreira da Silva',null,null],
  ['AÇOUGUE','Jose Marcio Nogueira da Silva',null,null],['AÇOUGUE','Wendel da Cunha Silva Alves',null,null],
  ['PADARIA','Wanna Jessica Carvalho da Cunha',1700,264],['PADARIA','Michelle Gomes dos Santos',1700,264],
  ['PADARIA','Francinalda Teixeira Ribeiro',1700,264],['PADARIA','Lorraine de Jesus de Moura',1700,200],
  ['PADARIA','Viviane Ribeiro Vinuto',1700,200],['PADARIA','Emileni',1700,200],
  ['PADARIA','Maria Anita Ribeiro de Sousa',1500,null],['PADARIA','Jeniffer',1700,264],
  ['LIMPEZA','Edenir Araújo Barbosa',1700,264],['LIMPEZA','Maria das Graças',1700,264],
  ['VERDURÃO','Janio Gonçalves de Almeida',1700,264],['VERDURÃO','Francisco Gilvan Ferreira da Silva',1700,140],
  ['CONFERÊNCIA','Luiz Almeida Calado',null,null],['CONFERÊNCIA','David Alves de Castro',null,null],
  ['ESTAGIÁRIOS','Erik Jeferson Aparecido dos Santos',700,150],['ESTAGIÁRIOS','Sara Maria Madureira Camargos',700,150],
  ['ESTAGIÁRIOS','Mateus Henrique Pontes de Araujo Souza',700,150],['ESTAGIÁRIOS','Rafael Gonçalves Figueiredo',700,150],
  ['ESTAGIÁRIOS','Mariana Bezerra Ferreira',700,150],['ESTAGIÁRIOS','Douglas Gomes Barbosa',700,286],['ESTAGIÁRIOS','Yago Almeida Garcia',700,150],
  ['GERÊNCIA','Edilane Rocha de Almeida',null,null],['GERÊNCIA','Marcelo Marques',null,null],
  ['GERÊNCIA','Vanduires de Oliveira Pinto',null,null],['GERÊNCIA','Tiago Moraes dos Santos',null,null],['GERÊNCIA','André Lemos',null,null]
];
function _seedL1(){
  var b=Date.now(), c=0;
  FOLHA_SEED_L1.forEach(function(s){
    var fid='U'+b+'_'+(c++);
    _DB.func.push({id:fid, loja:'l1', setor:s[0], nome:s[1], status:'ATIVO'});
    if(s[2]!=null) _DB.pag.push({id:'G'+b+'_'+(c++), loja:'l1', funcId:fid, tipo:'Salário', valor:String(s[2]), dia:'5DU', obs:'', status:'ATIVO'});
    if(s[3]!=null) _DB.pag.push({id:'G'+b+'_'+(c++), loja:'l1', funcId:fid, tipo:'Passagem', valor:String(s[3]), dia:'5DU', obs:'', status:'ATIVO'});
  });
}
function tReset(){ _DB={func:[],pag:[]}; _seedL1(); foCarregar(); toast('Dados resetados'); }

// ── _foPost FALSO: imita as respostas do servidor. No app real, troca por fetch(). ──
function _foPost(payload){
  return new Promise(function(resolve){
    setTimeout(function(){ resolve(_foFake(payload)); }, 120); // simula a rede
  });
}
function _foFake(d){
  var loja=_foLoja(), a=d.acao;
  if(a==='folha_list'){
    return { ok:true,
      funcionarios:_DB.func.filter(function(f){return f.status!=='INATIVO'&&f.loja===loja;}).map(function(f){return {id:f.id,setor:f.setor,nome:f.nome};}),
      pagamentos:_DB.pag.filter(function(p){return p.status!=='REMOVIDO'&&p.loja===loja;}).map(function(p){return {id:p.id,funcId:p.funcId,tipo:p.tipo,valor:p.valor,dia:p.dia,obs:p.obs};}) };
  }
  if(a==='funcionario_save'){
    if(d.id){ var f=_DB.func.find(function(x){return x.id===d.id;}); if(f){ f.setor=d.setor; f.nome=d.nome; return {ok:true,id:f.id}; } }
    var id='U'+Date.now(); _DB.func.push({id:id,loja:loja,setor:d.setor||'',nome:d.nome,status:'ATIVO'}); return {ok:true,id:id};
  }
  if(a==='funcionario_del'){ var ff=_DB.func.find(function(x){return x.id===d.id;}); if(ff){ ff.status='INATIVO'; _DB.pag.forEach(function(p){if(p.funcId===d.id)p.status='REMOVIDO';}); return {ok:true}; } return {ok:false,erro:'não achei'}; }
  if(a==='pagamento_save'){
    if(d.id){ var p=_DB.pag.find(function(x){return x.id===d.id;}); if(p){ p.tipo=d.tipo;p.valor=String(d.valor||'');p.dia=String(d.dia||'');p.obs=d.obs||''; return {ok:true,id:p.id}; } }
    var pid='G'+Date.now(); _DB.pag.push({id:pid,loja:loja,funcId:d.funcId,tipo:d.tipo,valor:String(d.valor||''),dia:String(d.dia||''),obs:d.obs||'',status:'ATIVO'}); return {ok:true,id:pid};
  }
  if(a==='pagamento_del'){ var pp=_DB.pag.find(function(x){return x.id===d.id;}); if(pp){ pp.status='REMOVIDO'; return {ok:true}; } return {ok:false}; }
  if(a==='folha_importar'){
    var existe={}; _DB.func.filter(function(f){return f.status!=='INATIVO'&&f.loja===loja;}).forEach(function(f){existe[f.nome.trim().toUpperCase()]=1;});
    var b=Date.now(), c=0, n=0;
    FOLHA_SEED_L1.forEach(function(s){ if(existe[String(s[1]).trim().toUpperCase()])return;
      var fid='U'+b+'_'+(c++); _DB.func.push({id:fid,loja:loja,setor:s[0],nome:s[1],status:'ATIVO'});
      if(s[2]!=null)_DB.pag.push({id:'G'+b+'_'+(c++),loja:loja,funcId:fid,tipo:'Salário',valor:String(s[2]),dia:'5DU',obs:'',status:'ATIVO'});
      if(s[3]!=null)_DB.pag.push({id:'G'+b+'_'+(c++),loja:loja,funcId:fid,tipo:'Passagem',valor:String(s[3]),dia:'5DU',obs:'',status:'ATIVO'});
      n++; });
    return {ok:true, criados:n};
  }
  return {ok:false, erro:'ação desconhecida'};
}

// ══════════════════════════════════════════════════════════════════
// MÓDULO FOLHA  (esta parte é a que vai pro index.html)
// ══════════════════════════════════════════════════════════════════
var _foFunc=[], _foPag=[];
var _foMesRef=new Date();
var _foDiaSel=0;
var FO_SETOR_ORDEM=['FRENTE DE CAIXA','FISCAIS DE CAIXA','REPOSITORES','AÇOUGUE','PADARIA','LIMPEZA','VERDURÃO','CONFERÊNCIA','ESTAGIÁRIOS','GERÊNCIA'];
var FO_TIPOS_SUGESTAO=['Salário','Passagem','Quebra de caixa','Auxílio aluguel','Bonificação','Extra','Auxílio cesta','Vale','Comissão'];

function _foLoja(){ return (lojaAtual==='all')?'l2':lojaAtual; }
function _foNomeLoja(){ var l=_foLoja(); return l==='l1'?'Loja 1 — Areal QS11':l==='l2'?'Loja 2 — Melhor QS8':l==='bolos'?'Ideal Bolos — Restaurante':l; }
function _foNum(s){ s=String(s==null?'':s).trim(); if(s==='')return 0; if(s.indexOf(',')>=0)s=s.replace(/\./g,'').replace(',','.'); s=s.replace(/[^0-9.]/g,''); var n=parseFloat(s); return isNaN(n)?0:n; }
function _foMesYM(){ return _foMesRef.getFullYear()+'-'+('0'+(_foMesRef.getMonth()+1)).slice(-2); }
function _foRenderMes(){ var el=document.getElementById('fo-mes-titulo'); if(el) el.textContent=_fzMesNomes[_foMesRef.getMonth()]+' '+_foMesRef.getFullYear(); }
function _foIniciais(nome){ var p=String(nome||'').trim().split(/\s+/); var a=(p[0]||'')[0]||''; var b=(p.length>1?(p[p.length-1][0]||''):''); return (a+b).toUpperCase(); }
// 5º dia útil do mês (pula só sábado e domingo)
function _fo5DU(y,m){ var c=0, dim=new Date(y,m+1,0).getDate(); for(var d=1;d<=dim;d++){ var wd=new Date(y,m,d).getDay(); if(wd!==0&&wd!==6){ c++; if(c===5) return d; } } return Math.min(5,dim); }
// dia real no calendário do mês y/m para um pagamento (aceita '5DU' ou número)
function _foDiaReal(diaStr,y,m){ diaStr=String(diaStr||'').trim(); if(diaStr==='5DU') return _fo5DU(y,m); var n=parseInt(diaStr,10)||0; if(n<1)return 0; var dim=new Date(y,m+1,0).getDate(); if(n>dim)n=dim; return n; }
function _foDiaLabel(diaStr){ diaStr=String(diaStr||'').trim(); if(diaStr==='5DU')return '5º dia útil'; var n=parseInt(diaStr,10)||0; return n?('dia '+n):'sem data'; }
function _foEh5DU(diaStr){ return String(diaStr||'').trim()==='5DU'; }
function _foPagsDe(funcId){ return _foPag.filter(function(p){ return p.funcId===funcId; }); }
function _foTotalFunc(funcId){ var t=0; _foPagsDe(funcId).forEach(function(p){ t+=_foNum(p.valor); }); return t; }

function abrirFolha(){
  if(!ehGestor()){ toast('A folha é só pro gestor'); return; }
  window.scrollTo(0,0);
  document.getElementById('fo-cfg-btn').style.display='inline';
  document.getElementById('fo-nova-btn').style.display='block';
  _foMesRef=new Date(); _foDiaSel=0;
  _foRenderMes(); foTab('lista'); foCarregar();
}
function _foBtn(on){ return on?'flex:1;padding:9px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;background:#16267A;color:#fff;border:none':'flex:1;padding:9px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:#16267A;border:1px solid #16267A'; }
function foTab(qual){
  document.getElementById('fo-tabbtn-lista').style.cssText=_foBtn(qual==='lista');
  document.getElementById('fo-tabbtn-cal').style.cssText=_foBtn(qual==='cal');
  var L=document.getElementById('fo-tab-lista'), C=document.getElementById('fo-tab-cal');
  if(qual==='cal'){ L.style.display='none'; C.style.display='block'; foRenderCal(); }
  else { C.style.display='none'; L.style.display='block'; foRenderLista(); }
}
function foCarregar(){
  var sub=document.getElementById('fo-sub'); if(sub) sub.textContent=_foNomeLoja();
  var box=document.getElementById('fo-lista');
  box.innerHTML='<div class="loadrow"><span class="spin"></span> Carregando…</div>';
  _foPost({acao:'folha_list'}).then(function(j){
    if(!j.ok || !Array.isArray(j.funcionarios)){ box.innerHTML='<div class="row-sub" style="padding:10px 2px;color:#A32D2D">O servidor ainda está na versão antiga. Publique a <b>NOVA VERSÃO</b> e toque em ↻.</div>'; return; }
    _foFunc=j.funcionarios; _foPag=j.pagamentos||[];
    foRenderTotal(); 
    if(document.getElementById('fo-tab-cal').style.display!=='none') foRenderCal(); else foRenderLista();
  }).catch(function(){ box.innerHTML='<div class="row-sub" style="padding:10px 2px;color:#A32D2D">Não consegui carregar. Toque em ↻.</div>'; });
}
function foRenderTotal(){
  var tot=0; _foPag.forEach(function(p){ tot+=_foNum(p.valor); });
  document.getElementById('fo-total').textContent=_precoBRL(tot);
  var semPag=0; _foFunc.forEach(function(f){ if(_foPagsDe(f.id).length===0) semPag++; });
  document.getElementById('fo-qtd').innerHTML=_foFunc.length+' pessoa(s)'+(semPag>0?('<br><span style="opacity:.8">'+semPag+' sem pagamento</span>'):'');
}

// ── LISTA: agrupada por setor, um cartão por pessoa ──
function foRenderLista(){
  var box=document.getElementById('fo-lista');
  if(!_foFunc.length){
    box.innerHTML='<div class="row-sub" style="padding:10px 2px;margin-bottom:10px">Nenhum funcionário nesta loja.</div>'
      + (ehGestor() && _foLoja()==='l1' ? '<button class="btn-primary" style="background:#fff;color:#0F6E56;border:1px solid #0F6E56" onclick="foImportar()"><i class="ti ti-download"></i> Importar os 56 (Loja 1)</button>' : '');
    return;
  }
  var g=ehGestor();
  // ordena setores pela ordem combinada; setor desconhecido vai pro fim
  var porSetor={}; _foFunc.forEach(function(f){ var s=f.setor||'(sem setor)'; (porSetor[s]=porSetor[s]||[]).push(f); });
  var setores=Object.keys(porSetor).sort(function(a,b){ var ia=FO_SETOR_ORDEM.indexOf(a), ib=FO_SETOR_ORDEM.indexOf(b); ia=ia<0?99:ia; ib=ib<0?99:ib; return ia-ib || a.localeCompare(b); });
  var html='';
  setores.forEach(function(s){
    var arr=porSetor[s].slice().sort(function(a,b){ return String(a.nome).localeCompare(String(b.nome)); });
    var totSetor=0; arr.forEach(function(f){ totSetor+=_foTotalFunc(f.id); });
    html+='<div style="display:flex;align-items:center;justify-content:space-between;margin:16px 2px 8px">'
      +'<div style="font-size:11.5px;color:#16267A;font-weight:700;letter-spacing:.3px">'+_precoEsc(s)+' · '+arr.length+'</div>'
      +'<div style="font-size:11.5px;color:#888780">'+_precoBRL(totSetor)+'</div></div>';
    arr.forEach(function(f){ html+=_foCardFunc(f,g); });
  });
  box.innerHTML=html;
}
function _foCardFunc(f,g){
  var pags=_foPagsDe(f.id).slice().sort(function(a,b){ return _foDiaReal(a.dia,_foMesRef.getFullYear(),_foMesRef.getMonth()) - _foDiaReal(b.dia,_foMesRef.getFullYear(),_foMesRef.getMonth()); });
  var tot=_foTotalFunc(f.id);
  var head='<div style="display:flex;align-items:center;gap:10px;margin-bottom:'+(pags.length?'10px':'4px')+'">'
    +'<div style="width:38px;height:38px;border-radius:50%;background:#16267A;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0">'+_precoEsc(_foIniciais(f.nome))+'</div>'
    +'<div style="flex:1;min-width:0"><div class="row-label" style="line-height:1.25">'+_precoEsc(f.nome)+'</div>'
    +'<div class="row-sub">'+(pags.length?(pags.length+' pagamento(s)'):'<span style="color:#B4B2A9">sem pagamento</span>')+'</div></div>'
    +(g?('<i class="ti ti-pencil" style="color:#888780;font-size:17px;cursor:pointer;padding:4px" onclick="foEditFunc(\''+f.id+'\')"></i><i class="ti ti-trash" style="color:#A32D2D;font-size:17px;cursor:pointer;padding:4px" onclick="foDelFunc(\''+f.id+'\')"></i>'):'')
    +'</div>';
  var linhas='';
  pags.forEach(function(p){
    var amber=_foEh5DU(p.dia);
    var acoes=g?('<i class="ti ti-pencil" style="color:#b8b6ad;font-size:15px;cursor:pointer;padding:3px;margin-left:2px" onclick="foEditPag(\''+p.id+'\')"></i><i class="ti ti-x" style="color:#cdaaaa;font-size:16px;cursor:pointer;padding:3px" onclick="foDelPag(\''+p.id+'\')"></i>'):'';
    linhas+='<div style="display:flex;align-items:center;gap:8px;padding:7px 9px;border:1px solid #EEE;border-radius:9px;margin-bottom:6px">'
      +'<span style="flex:1;font-size:13px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+_precoEsc(p.tipo)+'</span>'
      +'<span style="font-size:13px;font-weight:600;white-space:nowrap">'+_precoBRL(_foNum(p.valor))+'</span>'
      +'<span class="chip'+(amber?' chip-amber':'')+'">'+_precoEsc(_foDiaLabel(p.dia))+'</span>'+acoes+'</div>';
  });
  var add=g?('<button onclick="foNovoPag(\''+f.id+'\')" style="width:100%;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;border:1px dashed #16267A;background:#FFF8E1;color:#16267A;font-size:12.5px;border-radius:9px;cursor:pointer;margin-top:2px"><i class="ti ti-plus" style="font-size:15px"></i> Adicionar pagamento</button>'):'';
  var rodape=pags.length?('<div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:9px;border-top:1px solid #F0F0F0"><span style="font-size:11.5px;color:#888780">Total no mês</span><span style="font-size:14.5px;font-weight:700;color:#16267A">'+_precoBRL(tot)+'</span></div>'):'';
  return '<div class="row-card fo-fcard" style="flex-direction:column;align-items:stretch;margin-bottom:10px">'+head+linhas+add+rodape+'</div>';
}

// ── CALENDÁRIO ──
function foMesNav(delta){
  _foMesRef=new Date(_foMesRef.getFullYear(), _foMesRef.getMonth()+delta, 1);
  _foDiaSel=0; _foRenderMes(); foRenderTotal();
  if(document.getElementById('fo-tab-cal').style.display!=='none') foRenderCal(); else foRenderLista();
}
function _foPorDia(){
  var y=_foMesRef.getFullYear(), m=_foMesRef.getMonth(), por={};
  _foPag.forEach(function(p){
    var dia=_foDiaReal(p.dia,y,m); if(dia<1) return;
    if(!por[dia]) por[dia]={pags:[], has5DU:false};
    por[dia].pags.push(p); if(_foEh5DU(p.dia)) por[dia].has5DU=true;
  });
  return por;
}
function foRenderCal(){
  var y=_foMesRef.getFullYear(), m=_foMesRef.getMonth();
  _foRenderMes();
  var primeiro=new Date(y,m,1).getDay();
  var dim=new Date(y,m+1,0).getDate();
  var por=_foPorDia();
  var nomes=['D','S','T','Q','Q','S','S'];
  var html='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">';
  for(var w=0;w<7;w++){ html+='<div style="text-align:center;font-size:10px;color:#888780;font-weight:600;padding:2px 0">'+nomes[w]+'</div>'; }
  for(var b=0;b<primeiro;b++){ html+='<div></div>'; }
  for(var d=1;d<=dim;d++){
    var info=por[d]; var sel=(d===_foDiaSel);
    var bg,cor,dotCor,pulse='';
    if(sel){ bg='#16267A'; cor='#fff'; dotCor='#FFC400'; if(info&&info.has5DU) pulse='fo-dot'; }
    else if(info&&info.has5DU){ bg='#FFF3C4'; cor='#16267A'; dotCor='#E8A800'; pulse='fo-dot'; }
    else if(info){ bg='#E6E9F5'; cor='#16267A'; dotCor='#16267A'; }
    else { bg='#fff'; cor='#B4B2A9'; dotCor='transparent'; }
    var dot = info ? '<div class="'+pulse+'" style="width:5px;height:5px;border-radius:50%;background:'+dotCor+';margin:2px auto 0"></div>' : '';
    html+='<div class="fo-daycell" onclick="foDiaSel('+d+')" style="aspect-ratio:1;border:1px solid #eee;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:'+bg+';color:'+cor+';font-size:13px;font-weight:'+(info?'700':'400')+'">'+d+dot+'</div>';
  }
  html+='</div>';
  document.getElementById('fo-cal').innerHTML=html;
  foRenderDia(_foDiaSel);
}
function foDiaSel(d){ _foDiaSel=(_foDiaSel===d?0:d); foRenderCal(); }
function foRenderDia(d){
  var box=document.getElementById('fo-cal-dia'); if(!box) return;
  if(!d){ box.innerHTML='<div class="row-sub" style="text-align:center;padding:8px;color:#B4B2A9">Toque num dia para ver os pagamentos</div>'; return; }
  var info=_foPorDia()[d];
  var y=_foMesRef.getFullYear(), m=_foMesRef.getMonth();
  var e5=( _fo5DU(y,m)===d );
  var titulo='Dia '+d+(e5?' · 5º dia útil':'');
  if(!info){ box.innerHTML='<div class="row-sub" style="text-align:center;padding:12px">'+titulo+': nada a pagar</div>'; return; }
  // junta por funcionário
  var nomeDe={}; _foFunc.forEach(function(f){ nomeDe[f.id]=f.nome; });
  var lista=info.pags.slice().sort(function(a,b){ return String(nomeDe[a.funcId]||'').localeCompare(String(nomeDe[b.funcId]||'')); });
  var tot=0; var html='<div style="font-size:12.5px;color:#16267A;font-weight:600;margin-bottom:8px">'+titulo+' · '+lista.length+' pagamento(s)</div>';
  lista.forEach(function(p){ var n=_foNum(p.valor); tot+=n;
    html+='<div class="row-card" style="margin-bottom:8px;align-items:center"><div style="flex:1;min-width:0"><div class="row-label" style="font-size:13px">'+_precoEsc(nomeDe[p.funcId]||'?')+'</div><div class="row-sub">'+_precoEsc(p.tipo)+'</div></div><span style="font-size:13.5px;font-weight:600;color:#16267A;white-space:nowrap">'+_precoBRL(n)+'</span></div>';
  });
  html+='<div style="text-align:right;font-size:13px;color:#5F5E5A;margin-top:2px">Total do dia: <b style="color:#16267A">'+_precoBRL(tot)+'</b></div>';
  box.innerHTML=html;
}

// ── EDIÇÃO: funcionário ──
function foFuncForm(titulo, func, onOk){
  func=func||{};
  var ov=document.createElement('div'); ov.style.cssText='position:fixed;inset:0;background:rgba(20,30,60,.45);z-index:99999;display:flex;align-items:center;justify-content:center;padding:22px';
  var card=document.createElement('div'); card.style.cssText='background:#fff;border-radius:14px;max-width:340px;width:100%;padding:18px';
  var opts=FO_SETOR_ORDEM.map(function(s){ return '<option value="'+_precoEsc(s)+'"'+((func.setor||'')===s?' selected':'')+'>'+_precoEsc(s)+'</option>'; }).join('');
  card.innerHTML='<div style="font-size:14.5px;color:#16267A;margin-bottom:12px;font-weight:500">'+_precoEsc(titulo)+'</div>'
    +'<label style="font-size:11.5px;color:#5F5E5A">Nome</label>'
    +'<input id="_fo_nome" style="width:100%;padding:10px;border:1px solid #D3D1C7;border-radius:9px;font-size:14px;box-sizing:border-box;margin:3px 0 10px">'
    +'<label style="font-size:11.5px;color:#5F5E5A">Setor</label>'
    +'<select id="_fo_setor" style="width:100%;padding:10px;border:1px solid #D3D1C7;border-radius:9px;font-size:14px;box-sizing:border-box;margin:3px 0 4px;background:#fff">'+opts+'</select>'
    +'<div style="display:flex;gap:8px;margin-top:16px"><button id="_fo_no" style="flex:1;background:#fff;color:#5F5E5A;border:1px solid #D3D1C7;border-radius:9px;height:42px;font-size:14px">Cancelar</button>'
    +'<button id="_fo_yes" style="flex:1;background:#16267A;color:#fff;border:none;border-radius:9px;height:42px;font-size:14px;font-weight:500">Salvar</button></div>';
  ov.appendChild(card); document.body.appendChild(ov);
  var inN=card.querySelector('#_fo_nome'), inS=card.querySelector('#_fo_setor');
  inN.value=func.nome||'';
  setTimeout(function(){ try{ inN.focus(); }catch(e){} },80);
  function close(){ if(ov.parentNode) ov.parentNode.removeChild(ov); }
  ov.addEventListener('click',function(e){ if(e.target===ov) close(); });
  card.querySelector('#_fo_no').onclick=close;
  card.querySelector('#_fo_yes').onclick=function(){ var nome=inN.value.trim(); if(!nome){ toast('Digite o nome'); return; } close(); onOk({nome:nome, setor:inS.value}); };
}
function foNovoFunc(){ if(!ehGestor())return; foFuncForm('Novo funcionário',{}, function(v){ _foPost({acao:'funcionario_save', nome:v.nome, setor:v.setor}).then(function(j){ if(j.ok){ toast('Funcionário adicionado'); foCarregar(); } else toast(j.erro||'Erro'); }); }); }
function foEditFunc(id){ if(!ehGestor())return; var f=_foFunc.find(function(x){return x.id===id;}); if(!f)return; foFuncForm('Editar funcionário', f, function(v){ _foPost({acao:'funcionario_save', id:id, nome:v.nome, setor:v.setor}).then(function(j){ if(j.ok){ toast('Atualizado'); foCarregar(); } else toast(j.erro||'Erro'); }); }); }
function foDelFunc(id){ if(!ehGestor())return; var f=_foFunc.find(function(x){return x.id===id;}); appConfirm('Remover "'+(f?f.nome:'')+'" e todos os pagamentos dele?', function(){ _foPost({acao:'funcionario_del', id:id}).then(function(j){ if(j.ok){ toast('Removido'); foCarregar(); } else toast(j.erro||'Erro'); }); }, {danger:true, okText:'Remover'}); }

// ── EDIÇÃO: pagamento (com opção 5º dia útil) ──
function foPagForm(titulo, funcNome, pag, onOk){
  pag=pag||{};
  var eh5=(pag.dia===undefined? true : _foEh5DU(pag.dia)); // novo já vem como 5DU por padrão
  var diaNum=(!eh5 && pag.dia)? parseInt(pag.dia,10) : '';
  var ov=document.createElement('div'); ov.style.cssText='position:fixed;inset:0;background:rgba(20,30,60,.45);z-index:99999;display:flex;align-items:center;justify-content:center;padding:22px';
  var card=document.createElement('div'); card.style.cssText='background:#fff;border-radius:14px;max-width:350px;width:100%;padding:18px;max-height:88vh;overflow:auto';
  var chips=FO_TIPOS_SUGESTAO.map(function(t){ return '<span class="_fo_sug" style="font-size:12px;color:#16267A;background:#E6E9F5;padding:5px 10px;border-radius:16px;cursor:pointer">'+_precoEsc(t)+'</span>'; }).join('');
  card.innerHTML='<div style="font-size:14.5px;color:#16267A;margin-bottom:2px;font-weight:500">'+_precoEsc(titulo)+'</div>'
    +'<div style="font-size:11.5px;color:#888780;margin-bottom:12px">'+_precoEsc(funcNome||'')+'</div>'
    +'<label style="font-size:11.5px;color:#5F5E5A">Tipo de pagamento</label>'
    +'<input id="_fp_tipo" placeholder="ex: Salário, Extra, Auxílio cesta…" style="width:100%;padding:10px;border:1px solid #D3D1C7;border-radius:9px;font-size:14px;box-sizing:border-box;margin:3px 0 8px">'
    +'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">'+chips+'</div>'
    +'<label style="font-size:11.5px;color:#5F5E5A">Valor (R$)</label>'
    +'<input id="_fp_valor" inputmode="decimal" placeholder="ex: 1700,00" style="width:100%;padding:10px;border:1px solid #D3D1C7;border-radius:9px;font-size:14px;box-sizing:border-box;margin:3px 0 12px">'
    +'<label style="font-size:11.5px;color:#5F5E5A">Quando paga?</label>'
    +'<div style="display:flex;gap:8px;margin:5px 0 8px">'
    +'<button id="_fp_b5" type="button" style="flex:1;height:40px;border-radius:9px;font-size:13px;cursor:pointer">5º dia útil</button>'
    +'<button id="_fp_bf" type="button" style="flex:1;height:40px;border-radius:9px;font-size:13px;cursor:pointer">Dia fixo</button></div>'
    +'<div id="_fp_diawrap" style="display:none;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:13px;color:#5F5E5A">Dia</span><input id="_fp_dia" type="number" min="1" max="31" style="width:90px;padding:9px;border:1px solid #D3D1C7;border-radius:9px;font-size:14px"></div>'
    +'<div style="display:flex;gap:8px;margin-top:16px"><button id="_fp_no" style="flex:1;background:#fff;color:#5F5E5A;border:1px solid #D3D1C7;border-radius:9px;height:42px;font-size:14px">Cancelar</button>'
    +'<button id="_fp_yes" style="flex:1;background:#16267A;color:#fff;border:none;border-radius:9px;height:42px;font-size:14px;font-weight:500">Salvar</button></div>';
  ov.appendChild(card); document.body.appendChild(ov);
  var inT=card.querySelector('#_fp_tipo'), inV=card.querySelector('#_fp_valor'), inD=card.querySelector('#_fp_dia');
  var b5=card.querySelector('#_fp_b5'), bf=card.querySelector('#_fp_bf'), wrap=card.querySelector('#_fp_diawrap');
  inT.value=pag.tipo||''; inV.value=pag.valor?String(pag.valor).replace('.',','):''; inD.value=diaNum;
  var modo5=eh5;
  function pinta(){ b5.style.cssText='flex:1;height:40px;border-radius:9px;font-size:13px;cursor:pointer;'+(modo5?'background:#16267A;color:#fff;border:none':'background:#fff;color:#16267A;border:1px solid #16267A'); bf.style.cssText='flex:1;height:40px;border-radius:9px;font-size:13px;cursor:pointer;'+(!modo5?'background:#16267A;color:#fff;border:none':'background:#fff;color:#16267A;border:1px solid #16267A'); wrap.style.display=modo5?'none':'flex'; }
  pinta();
  b5.onclick=function(){ modo5=true; pinta(); };
  bf.onclick=function(){ modo5=false; pinta(); setTimeout(function(){ try{inD.focus();}catch(e){} },50); };
  card.querySelectorAll('._fo_sug').forEach(function(el){ el.onclick=function(){ inT.value=el.textContent; }; });
  setTimeout(function(){ try{ inT.focus(); }catch(e){} },80);
  function close(){ if(ov.parentNode) ov.parentNode.removeChild(ov); }
  ov.addEventListener('click',function(e){ if(e.target===ov) close(); });
  card.querySelector('#_fp_no').onclick=close;
  card.querySelector('#_fp_yes').onclick=function(){
    var tipo=inT.value.trim(); if(!tipo){ toast('Diga o tipo'); return; }
    var s=String(inV.value||'').trim(); if(s.indexOf(',')>=0)s=s.replace(/\./g,'').replace(',','.'); s=s.replace(/[^0-9.]/g,'');
    var dia='5DU';
    if(!modo5){ var n=parseInt(inD.value,10)||0; if(n<1||n>31){ toast('Dia de 1 a 31'); return; } dia=String(n); }
    close(); onOk({tipo:tipo, valor:s, dia:dia});
  };
}
function foNovoPag(funcId){ if(!ehGestor())return; var f=_foFunc.find(function(x){return x.id===funcId;}); foPagForm('Novo pagamento', f?f.nome:'', {}, function(v){ _foPost({acao:'pagamento_save', funcId:funcId, tipo:v.tipo, valor:v.valor, dia:v.dia}).then(function(j){ if(j.ok){ toast('Pagamento adicionado'); foCarregar(); } else toast(j.erro||'Erro'); }); }); }
function foEditPag(id){ if(!ehGestor())return; var p=_foPag.find(function(x){return x.id===id;}); if(!p)return; var f=_foFunc.find(function(x){return x.id===p.funcId;}); foPagForm('Editar pagamento', f?f.nome:'', p, function(v){ _foPost({acao:'pagamento_save', id:id, funcId:p.funcId, tipo:v.tipo, valor:v.valor, dia:v.dia}).then(function(j){ if(j.ok){ toast('Atualizado'); foCarregar(); } else toast(j.erro||'Erro'); }); }); }
function foDelPag(id){ if(!ehGestor())return; var p=_foPag.find(function(x){return x.id===id;}); appConfirm('Remover o pagamento "'+(p?p.tipo:'')+'"?', function(){ _foPost({acao:'pagamento_del', id:id}).then(function(j){ if(j.ok){ toast('Removido'); foCarregar(); } else toast(j.erro||'Erro'); }); }, {danger:true, okText:'Remover'}); }

}
function foConfigMenu(){
  if(!ehGestor())return;
  var ov=document.createElement('div'); ov.style.cssText='position:fixed;inset:0;background:rgba(20,30,60,.45);z-index:99999;display:flex;align-items:center;justify-content:center;padding:22px';
  var card=document.createElement('div'); card.style.cssText='background:#fff;border-radius:14px;max-width:320px;width:100%;padding:18px';

    +(_foLoja()==='l1'?'<button id="_fc_imp" style="width:100%;background:#fff;color:#0F6E56;border:1px solid #0F6E56;border-radius:9px;height:44px;font-size:14px;margin-bottom:8px;cursor:pointer"><i class="ti ti-download"></i> Importar os 56 (Loja 1)</button>':'')
    +'<div style="font-size:11.5px;color:#888780;margin:2px 2px 10px;line-height:1.4">Cada pessoa tem um "+" pra adicionar pagamentos (salário, extra, auxílio…), cada um com valor e data.</div>'
    +'<button id="_fc_cancel" style="width:100%;background:#fff;color:#5F5E5A;border:1px solid #D3D1C7;border-radius:9px;height:42px;font-size:14px;cursor:pointer">Fechar</button>';
  ov.appendChild(card); document.body.appendChild(ov);
  function close(){ if(ov.parentNode) ov.parentNode.removeChild(ov); }
  ov.addEventListener('click',function(e){ if(e.target===ov) close(); });
  card.querySelector('#_fc_cancel').onclick=close;
  card.querySelector('#_fc_novo').onclick=function(){ close(); foNovoFunc(); };
  if(card.querySelector('#_fc_imp')) card.querySelector('#_fc_imp').onclick=function(){ close(); foImportar(); };
}

abrirFolha();
